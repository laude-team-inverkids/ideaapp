<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Juego Simple</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        background: #111;
    }
    #player {
        width: 40px;
        height: 40px;
        background: lime;
        position: absolute;
        top: 100px;
        left: 100px;
    }
    #target {
        width: 30px;
        height: 30px;
        background: red;
        position: absolute;
    }
    #score {
        position: fixed;
        top: 10px;
        left: 10px;
        color: white;
        font-size: 20px;
        font-family: Arial;
    }
</style>
</head>
<body>

<div id="player"></div>
<div id="target"></div>
<div id="score">Puntos: 0</div>

<script>
const player = document.getElementById("player");
const target = document.getElementById("target");
const scoreText = document.getElementById("score");

let x = 100;
let y = 100;
let score = 0;
const speed = 10;

function moveTarget() {
    target.style.left = Math.random() * (window.innerWidth - 30) + "px";
    target.style.top = Math.random() * (window.innerHeight - 30) + "px";
}

moveTarget();

document.addEventListener("keydown", (e) => {
    if (e.key === "ArrowUp") y -= speed;
    if (e.key === "ArrowDown") y += speed;
    if (e.key === "ArrowLeft") x -= speed;
    if (e.key === "ArrowRight") x += speed;

    player.style.left = x + "px";
    player.style.top = y + "px";

    checkCollision();
});

function checkCollision() {
    const pRect = player.getBoundingClientRect();
    const tRect = target.getBoundingClientRect();

    if (
        pRect.left < tRect.right &&
        pRect.right > tRect.left &&
        pRect.top < tRect.bottom &&
        pRect.bottom > tRect.top
    ) {
        score++;
        scoreText.textContent = "Puntos: " + score;
        moveTarget();
    }
}
</script>

</body>
</html>
