<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Stickman ULTRA DIOS</title>
<style>
body { margin:0; overflow:hidden; background:#87CEEB; }
canvas { display:block; margin:auto; }

/* botones móvil */
.btn {
    position: fixed;
    bottom: 20px;
    padding: 15px;
    background: rgba(0,0,0,0.5);
    color: white;
    font-size: 20px;
    border-radius: 10px;
    user-select: none;
}
#jumpBtn { left: 20px; }
#dashBtn { right: 20px; }
</style>
</head>
<body>

<canvas id="game" width="900" height="400"></canvas>

<div id="jumpBtn" class="btn">JUMP</div>
<div id="dashBtn" class="btn">DASH</div>

<script>
window.onload = function() {

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// audio simple
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function beep(freq) {
    let osc = audioCtx.createOscillator();
    let gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.value = freq;
    osc.start();
    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.2);
}

// física
let gravity = 0.5;
let gameOver = false;

// salto
let jumpCount = 0;
const maxJumps = 3;

// dash
let dash = false;
let dashTime = 0;
let dashCooldown = 0;

// score + record
let score = 0;
let best = localStorage.getItem("best") || 0;

// velocidad
let speedBase = 3;

// animación piernas
let legAnim = 0;

// partículas
let particles = [];

// fondo
let bgOffset = 0;

let player = { x:200, y:0, vy:0 };
let buildings = [];

function createStart(){
    let b={x:0,y:300,w:400,h:100};
    buildings.push(b);
    player.y=b.y;
}

function createBuilding(){
    let h=Math.random()*100+120;
    let gap=Math.random()*80+40;
    let last=buildings[buildings.length-1];

    buildings.push({
        x:last.x+last.w+gap,
        y:canvas.height-h,
        w:120,
        h:h
    });
}

// partículas
function spawnParticles(){
    for(let i=0;i<5;i++){
        particles.push({
            x:player.x,
            y:player.y,
            vx:Math.random()*-2,
            vy:Math.random()*-2,
            life:20
        });
    }
}

function drawParticles(){
    ctx.fillStyle="rgba(0,0,0,0.3)";
    particles.forEach(p=>ctx.fillRect(p.x,p.y,3,3));
}

// fondo
function drawBackground(speed){
    bgOffset -= speed*0.3;
    ctx.fillStyle="#a0d8ff";
    ctx.fillRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="#888";
    for(let i=0;i<20;i++){
        let x=(i*200+bgOffset)%2000;
        ctx.fillRect(x,200,80,200);
    }
}

// stickman animado
function drawPlayer(){
    ctx.strokeStyle = dash ? "red":"black";

    // cabeza
    ctx.beginPath();
    ctx.arc(player.x,player.y-30,8,0,Math.PI*2);
    ctx.stroke();

    // cuerpo
    ctx.beginPath();
    ctx.moveTo(player.x,player.y-20);
    ctx.lineTo(player.x,player.y);
    ctx.stroke();

    // piernas animadas
    legAnim += 0.2;
    let swing = Math.sin(legAnim)*10;

    ctx.beginPath();
    ctx.moveTo(player.x,player.y);
    ctx.lineTo(player.x-10+swing,player.y+10);
    ctx.moveTo(player.x,player.y);
    ctx.lineTo(player.x+10-swing,player.y+10);
    ctx.stroke();
}

function drawBuildings(){
    ctx.fillStyle="#222";
    buildings.forEach(b=>ctx.fillRect(b.x,b.y,b.w,b.h));
}

function update(){
    if(gameOver) return;

    player.vy+=gravity;
    player.y+=player.vy;

    speedBase+=0.0007;
    let speed=dash?12:speedBase;

    buildings.forEach(b=>b.x-=speed);
    if(buildings.length<6) createBuilding();

    let onBuilding=false;

    buildings.forEach(b=>{
        if(player.x>b.x && player.x<b.x+b.w &&
           player.y>=b.y && player.y<=b.y+15 && player.vy>=0){
            player.y=b.y;
            player.vy=0;
            onBuilding=true;
        }
    });

    if(onBuilding) jumpCount=0;
    if(player.y>canvas.height) gameOver=true;

    score+=0.1;

    if(dash){
        dashTime--;
        spawnParticles();
        if(dashTime<=0){
            dash=false;
            dashCooldown=50;
        }
    }

    if(dashCooldown>0) dashCooldown--;

    particles.forEach(p=>{
        p.x+=p.vx;
        p.y+=p.vy;
        p.life--;
    });
    particles=particles.filter(p=>p.life>0);

    if(score>best){
        best = Math.floor(score);
        localStorage.setItem("best", best);
    }
}

function draw(){
    let speed=dash?12:speedBase;

    drawBackground(speed);
    drawBuildings();
    drawPlayer();
    drawParticles();

    ctx.fillStyle="black";
    ctx.font="16px Arial";
    ctx.fillText("Score: "+Math.floor(score),10,20);
    ctx.fillText("Best: "+best,10,40);

    if(gameOver){
        ctx.font="40px Arial";
        ctx.fillText("GAME OVER",320,200);
    }
}

function loop(){
    update();
    draw();
    requestAnimationFrame(loop);
}

// acciones
function jump(){
    if(jumpCount<maxJumps){
        player.vy=-14;
        jumpCount++;
        beep(400);
    }
}

function doDash(){
    if(dashCooldown===0){
        dash=true;
        dashTime=10;
        beep(100);
    }
}

// teclado
document.addEventListener("keydown",e=>{
    if(e.code==="Space") jump();
    if(e.code==="ShiftLeft") doDash();
});

// móvil
document.getElementById("jumpBtn").ontouchstart = jump;
document.getElementById("dashBtn").ontouchstart = doDash;

// click
document.addEventListener("click",jump);

createStart();
loop();

};
</script>

</body>
</html>
