<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Idea App</title>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #696969;
  color: #333;
}

.navbar {
  display: flex;
  justify-content: space-between;
  padding: 20px 40px;
  background: #555;
}

.nav-right button {
  background: #B0E0E6;
  border: none;
  padding: 10px 20px;
  border-radius: 20px;
  color: #333;
  cursor: pointer;
}

.header {
  text-align: center;
  margin-top: 40px;
}

.header h1 { color: #B0E0E6; font-size: 48px; }
.header p { color: #40E0D0; }

.search-box { display: flex; justify-content: center; margin: 30px 0; }
.search-box input { width: 60%; padding: 18px; border-radius: 40px; border: none; font-size: 18px; }

.container { display: flex; justify-content: space-around; margin: 40px; gap: 20px; }

.section { width: 45%; background: #fff; padding: 20px; border-radius: 16px; }
.cards { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
.card { height: 140px; border-radius: 12px; background: #eee; display: flex; justify-content: center; align-items: center; cursor: pointer; position: relative; overflow: hidden; }
.card img { width: 100%; height: 100%; object-fit: cover; border-radius: 12px; }

/* Overlay para mostrar título y descripción */
.overlay {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  background: rgba(0,0,0,0.7);
  color: #fff;
  padding: 10px;
  text-align: center;
  opacity: 0;
  transition: opacity 0.3s;
  height: 100%;
  display: flex;
  flex-direction: column;
  justify-content: center;
  border-radius: 12px;
}

.card:hover .overlay {
  opacity: 1;
}

/* Botón de eliminar idea */
.delete-btn {
  position: absolute;
  top: 5px;
  right: 5px;
  background: red;
  color: white;
  border: none;
  border-radius: 50%;
  width: 24px;
  height: 24px;
  cursor: pointer;
  font-weight: bold;
  line-height: 20px;
  text-align: center;
}

.float-btn { position: fixed; bottom: 20px; right: 20px; background: #2bbecb; color: white; border-radius: 50%; width: 60px; height: 60px; display: flex; justify-content: center; align-items: center; font-size: 30px; cursor: pointer; }
</style>
</head>
<body>

<div class="navbar">
  <div></div>
  <div class="nav-right"><button>Servnent</button></div>
</div>

<div class="header">
  <h1>It's time to imagine</h1>
  <p>Search by creator & category.</p>
</div>

<div class="search-box">
  <input type="text" placeholder="Search an idea">
</div>

<div class="container">
  <div class="section">
    <h2>Your ideas</h2>
    <div class="cards" id="your-ideas"></div>
  </div>
  <div class="section">
    <h2>Recently viewed ideas</h2>
    <div class="cards">
      <div class="card">Example</div>
      <div class="card">Example</div>
    </div>
  </div>
</div>

<div class="float-btn" onclick="addIdea()">+</div>

<script>
// Cargar ideas desde localStorage al inicio
let ideas = JSON.parse(localStorage.getItem("ideas")) || [];

// Función para agregar una idea nueva
function addIdea() {
  const title = prompt("Escribe el título de tu idea:");
  if (!title) return alert("Debes escribir un título");
  const desc = prompt("Escribe la descripción de tu idea:") || "";
  const img = prompt("Ingresa URL de la imagen (opcional):") || "";

  const idea = {
    id: Date.now(),
    title,
    desc,
    img
  };

  ideas.push(idea);
  localStorage.setItem("ideas", JSON.stringify(ideas));
  renderIdeas();
}

// Función para eliminar una idea
function deleteIdea(id) {
  ideas = ideas.filter(idea => idea.id !== id);
  localStorage.setItem("ideas", JSON.stringify(ideas));
  renderIdeas();
}

// Función para mostrar ideas en el contenedor
function renderIdeas() {
  const container = document.getElementById("your-ideas");
  container.innerHTML = "";
  ideas.forEach(idea => {
    const card = document.createElement("div");
    card.className = "card";

    // Imagen si existe
    if (idea.img) {
      const img = document.createElement("img");
      img.src = idea.img;
      img.alt = idea.title;
      card.appendChild(img);
    }

    // Overlay con título y descripción
    const overlay = document.createElement("div");
    overlay.className = "overlay";
    overlay.innerHTML = `<h3>${idea.title}</h3><p>${idea.desc}</p>`;
    card.appendChild(overlay);

    // Botón de eliminar
    const delBtn = document.createElement("button");
    delBtn.className = "delete-btn";
    delBtn.textContent = "×";
    delBtn.onclick = (e) => {
      e.stopPropagation();
      deleteIdea(idea.id);
    };
    card.appendChild(delBtn);

    container.appendChild(card);
  });
}

// Buscador (solo redirección a resultados.html)
const input = document.querySelector(".search-box input");
input.addEventListener("keydown", function(e){
  if(e.key === "Enter"){
    const value = input.value.trim();
    if(value) window.location.href = "resultados.html?q=" + encodeURIComponent(value);
  }
});

// Render inicial
renderIdeas();
</script>

</body>
</html>
