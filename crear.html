<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Idea</title>
<style>
body{font-family:'Segoe UI';background:#696969;color:white;text-align:center;padding:40px;}
input,textarea{width:60%;padding:15px;margin:10px;border-radius:10px;border:none;}
button{padding:12px 25px;border-radius:20px;border:none;background:#2bbecb;color:white;cursor:pointer;}
</style>
</head>
<body>

<h1>Create your idea</h1>
<input type="text" id="title" placeholder="Title"><br>
<textarea id="desc" placeholder="Description"></textarea><br>
<input type="text" id="img" placeholder="Image URL"><br>
<button onclick="saveIdea()">Finish</button>

<script>
function saveIdea(){
  const title=document.getElementById("title").value.trim();
  const desc=document.getElementById("desc").value.trim();
  const img=document.getElementById("img").value.trim();
  if(!title)return alert("Write a title");
  const idea={id:Date.now(),title:title,desc:desc,img:img};
  let ideas=JSON.parse(localStorage.getItem("ideas"))||[];
  ideas.push(idea);
  localStorage.setItem("ideas",JSON.stringify(ideas));
  window.location.href="index.html";
}
</script>

</body>
</html>
